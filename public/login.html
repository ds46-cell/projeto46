<!DOCTYPE html>
<html>
<head>
<title>SIGOV Admin</title>
<style>

body{
 background:#0b0f17;
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.box{
 background:#141a26;
 padding:40px;
 border-radius:10px;
}

input{
 display:block;
 margin:10px 0;
 padding:10px;
 width:200px;
}

button{
 padding:10px;
 width:100%;
 background:#00e5ff;
 border:none;
}

</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

 const u=document.getElementById("user").value
 const p=document.getElementById("pass").value

 if(u==="admin" && p==="sigov"){
  location="dashboard.html"
 }else{
  alert("invalid")
 }

}

</script>

</body>
</html>
